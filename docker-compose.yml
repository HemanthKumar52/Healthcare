services:
  postgres:
    image: postgres:17-alpine
    container_name: hdm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hdm_user
      POSTGRES_PASSWORD: hdm_password
      POSTGRES_DB: healthcare_marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hdm_user -d healthcare_marketplace"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: hdm-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: hdm_master_key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  meilisearch_data:
